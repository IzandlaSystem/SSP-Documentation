name: Sync Submodules

on:
  repository_dispatch:
    types:
      - submodule-updated

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.SUBMODULES_PAT }}

      - name: Refresh submodules to latest remote commits
        run: |
          git submodule update --remote --merge

      - name: Commit updated submodule pointers
        run: |
          if git diff --quiet --exit-code; then
            echo "No submodule pointer changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/projects .gitmodules
          git commit -m "chore: update submodule refs [skip ci]"
          git push origin HEAD:main