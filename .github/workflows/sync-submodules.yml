name: Sync Submodules

on:
  repository_dispatch:
    types:
      - submodule-updated

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git for private submodules
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULES_PAT }}@github.com/".insteadOf "git@github.com:"

      - name: Refresh submodules to latest remote commits
        run: |
          git submodule update --init --recursive
          git submodule update --remote --merge

      - name: Commit updated submodule pointers
        run: |
          if git diff --quiet --exit-code; then
            echo "No submodule pointer changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/projects .gitmodules
          git commit -m "chore: update submodule refs"
          git push origin HEAD:main